name: arini_plus_app
description: "Development by Eng. Shady Mohammed"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+4

environment:
  sdk: ^3.10.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.3
  #State management
  provider: ^6.1.5+1
  path_provider: ^2.1.5
  #Cache
  shared_preferences: ^2.2.1
  #supabase
  supabase_flutter: ^2.12.4
  supabase: ^2.10.6
  uuid: ^4.5.1
  # url_launcher
  url_launcher: ^6.3.2
  # share app_links:
  share_plus: ^10.0.0
  # path
  path: ^1.9.0
  solar_icons: any
  connectivity_plus: ^6.1.4
  flutter_image_compress: ^2.4.0
  #firebase
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1

dependency_overrides:
  objective_c: 9.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  intl_utils: ^2.7.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_app_v1.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  fonts:
    - family: ibmPlexSansArabic
      fonts:
        - asset: assets/fonts/ibm_plex_sans/ibm_plex_sans_arabic_regular.ttf
          weight: 400
        - asset: assets/fonts/ibm_plex_sans/ibm_plex_sans_arabic_medium.ttf
          weight: 500
        - asset: assets/fonts/ibm_plex_sans/ibm_plex_sans_arabic_semi_bold.ttf
          weight: 600
        - asset: assets/fonts/ibm_plex_sans/ibm_plex_sans_arabic_bold.ttf
          weight: 700


